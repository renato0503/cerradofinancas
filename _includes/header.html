<style>
  /* ================= APPLE GLASSMORPHISM HEADER ================= */
  
  #header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    height: 90px;
    display: flex;
    align-items: center;
    background: rgba(10, 15, 30, 0.65); /* Fundo escuro translúcido */
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    animation: headerSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .nav-container {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  @keyframes headerSlideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ================= LOGO GIGANTE ================= */
  #header .brand img {
    height: 70px; /* Aumentado para chamar mais atenção */
    width: auto;
    border-radius: 8px;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    display: block;
  }
  #header .brand:hover img {
    transform: scale(1.05) translateY(-2px);
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4));
  }

  /* ================= DESKTOP MENU ================= */
  #header .desktop-menu {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  #header .desktop-menu a:not(.btn-primary) {
    position: relative;
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.3px;
    transition: color 0.3s ease;
    padding-bottom: 5px;
    display: inline-block;
  }

  #header .desktop-menu a:not(.btn-primary):hover {
    color: #fecb00;
  }

  /* Traço animado nos links */
  #header .desktop-menu a:not(.btn-primary)::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #fecb00;
    border-radius: 2px;
    transition: width 0.3s ease-out;
  }

  #header .desktop-menu a:not(.btn-primary):hover::after {
    width: 100%;
  }

  /* Botão CTA Principal */
  #header .btn-primary {
    background: linear-gradient(135deg, #fecb00 0%, #eab308 100%);
    color: #001f5c;
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 800;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(254, 203, 0, 0.2);
    transition: all 0.3s ease;
    display: inline-block;
  }
  
  #header .btn-primary:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 25px rgba(254, 203, 0, 0.4);
  }

  /* ================= BOTÃO MOBILE (PADRÃO ESCONDIDO NO PC) ================= */
  #header .mobile-toggle {
    display: none; /* Escondido no Computador */
    background: transparent;
    border: none;
    color: #f8fafc;
    cursor: pointer;
    transition: transform 0.3s ease, color 0.3s ease;
  }
  #header .mobile-toggle:hover {
    transform: scale(1.1);
    color: #fecb00;
  }

  /* ================= RESPONSIVO (CELULAR E TABLET) ================= */
  @media (max-width: 992px) {
    #header { 
      height: 80px; 
    }
    
    #header .brand img { 
      height: 55px; /* Proporção ideal para mobile */
    }

    /* Revela o botão sanduíche no celular */
    #header .mobile-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Transforma o menu Desktop em Dropdown */
    #header .desktop-menu {
      position: absolute;
      top: 80px; 
      left: 0;
      width: 100%;
      flex-direction: column;
      background: rgba(10, 15, 30, 0.98); 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 30px 20px;
      gap: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      
      /* Estado 1: Fechado (Invisível, mas animável) */
      visibility: hidden;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s ease-in-out;
      pointer-events: none; /* Evita cliques invisíveis */
    }

    /* Estado 2: Aberto (Injetado via JS) */
    #header .desktop-menu.menu-aberto {
      visibility: visible;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto; /* Permite os cliques */
    }

    /* Ajustes das fontes dos links no Mobile */
    #header .desktop-menu a:not(.btn-primary) {
      font-size: 1.15rem;
      width: 100%;
      text-align: center;
      padding: 10px 0;
    }

    #header .btn-primary {
      width: 100%;
      text-align: center;
      margin-top: 10px;
      padding: 16px;
      font-size: 1.1rem;
    }
  }
</style>

<header id="header">
  <div class="container nav-container">
    
    <a href="/index.html" class="brand">
      <img src="/img/logoheader.png" alt="Logo Cerrado Finanças">
    </a>

    <button class="mobile-toggle" aria-label="Abrir menu" onclick="toggleMobileMenu()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <nav class="desktop-menu" id="navMenu">
      <a href="/index.html">Início</a>
      <a href="/contabilidade.html">Contabilidade</a>
      <a href="/solucoes.html">Fábrica de Software</a>
      <a href="/startups.html">Startups</a>
      <a href="/parceiros.html">Parceiros</a>
      <a href="/data-driven.html">Somos Data Driven</a>
      
      <a href="https://api.whatsapp.com/send?phone=5567993515206" target="_blank" class="btn-primary">Falar com Especialista</a>
    </nav>
  </div>
</header>

<script>
  // Função limpa e direta para abrir e fechar a caixa do menu
  function toggleMobileMenu() {
    var menu = document.getElementById("navMenu");
    menu.classList.toggle("menu-aberto");
  }
</script>
