<style>
  /* ================= APPLE GLASSMORPHISM HEADER ================= */
  
  /* Reset de altura do container para caber a logo maior */
  #header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    height: 90px;
    display: flex;
    align-items: center;
    
    /* Efeito Vidro (Glassmorphism) */
    background: rgba(10, 15, 30, 0.65) !important;
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    
    /* Animação de entrada */
    animation: headerSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .nav-container {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Animação de Descida do Header */
  @keyframes headerSlideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Logo Ampliada com Efeito Hover */
  #header .brand img {
    height: 68px !important; /* Logo Gigante no Desktop */
    width: auto;
    border-radius: 8px;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  }
  #header .brand:hover img {
    transform: scale(1.05) translateY(-2px);
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4));
  }

  /* ================= DESKTOP MENU ================= */
  #header .desktop-menu {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  #header .desktop-menu a:not(.btn-primary) {
    position: relative;
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.3px;
    transition: color 0.3s ease;
    padding-bottom: 5px;
  }

  #header .desktop-menu a:not(.btn-primary):hover {
    color: #fecb00;
  }

  /* Traço animado nos links */
  #header .desktop-menu a:not(.btn-primary)::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #fecb00;
    border-radius: 2px;
    transition: width 0.3s ease-out;
  }

  #header .desktop-menu a:not(.btn-primary):hover::after {
    width: 100%;
  }

  /* Botão CTA Principal */
  #header .btn-primary {
    background: linear-gradient(135deg, #fecb00 0%, #eab308 100%);
    color: #001f5c !important;
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 800;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(254, 203, 0, 0.2);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  #header .btn-primary:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 25px rgba(254, 203, 0, 0.4);
    background: linear-gradient(135deg, #fde047 0%, #ca8a04 100%);
  }

  /* Esconde o botão do menu no computador */
  @media (min-width: 993px) {
    #header .mobile-toggle {
      display: none;
    }
  }

  /* Botão do menu mobile */
  #header .mobile-toggle {
    background: transparent;
    border: none;
    color: #f8fafc;
    cursor: pointer;
    transition: transform 0.3s ease, color 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #header .mobile-toggle:hover {
    transform: scale(1.1);
    color: #fecb00;
  }

  /* ================= MOBILE MENU (CELULAR) ================= */
  @media (max-width: 992px) {
    #header { 
      height: 80px; 
    }
    #header .brand img { 
      height: 55px !important; /* Logo um pouco menor no celular */
    }

    /* Esconde o menu e transforma em uma caixa que desce */
    #header .desktop-menu {
      position: absolute;
      top: 80px; /* Fica exatamente abaixo da barra do header */
      left: 0;
      width: 100%;
      background: rgba(10, 15, 30, 0.98); /* Fundo quase sólido para leitura */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-direction: column;
      padding: 30px 20px;
      gap: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      
      /* Estado Fechado */
      opacity: 0;
      visibility: hidden;
      transform: translateY(-20px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Estado Aberto (Controlado pelo JavaScript abaixo) */
    #header .desktop-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* Ajustes visuais dos links no Mobile */
    #header .desktop-menu a:not(.btn-primary) {
      font-size: 1.15rem;
      width: 100%;
      text-align: center;
      padding: 10px 0;
    }

    #header .btn-primary {
      width: 100%;
      text-align: center;
      margin-top: 15px;
      padding: 16px;
      font-size: 1.1rem;
    }
  }
</style>

<header id="header">
  <div class="container nav-container">
    
    <a href="/index.html" class="brand">
      <img src="/img/logoheader.png" alt="Logo Cerrado Finanças">
    </a>

    <button class="mobile-toggle" id="btnMenuToggle" aria-label="Abrir menu">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <nav class="desktop-menu" id="navMenu">
      <a href="/index.html">Início</a>
      <a href="/index.html#maturidade">Metodologia</a>
      <a href="/contabilidade.html">Contabilidade</a>
      <a href="/solucoes.html">Fábrica de Software</a>
      <a href="/startups.html">Startups</a>
      <a href="/parceiros.html">Parceiros</a>
      
      <a href="https://api.whatsapp.com/send?phone=5567993515206" target="_blank" class="btn-primary">Falar com Especialista</a>
    </nav>
  </div>
</header>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const btnToggle = document.getElementById('btnMenuToggle');
    const navMenu = document.getElementById('navMenu');

    if (btnToggle && navMenu) {
      btnToggle.addEventListener('click', () => {
        navMenu.classList.toggle('active');
      });
    }
  });
</script>
