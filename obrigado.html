<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diagnóstico Solicitado | Cerrado Finanças</title>
  <link rel="icon" type="image/png" href="logo.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/global.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    /* ==========================================================================
       ESTILOS EXCLUSIVOS DA PÁGINA DE SUCESSO (OBRIGADO)
       ========================================================================== */
    body {
      background-color: var(--primary); /* Fundo escuro para elegância */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .success-card {
      background: var(--surface);
      color: var(--text-main);
      max-width: 540px;
      width: 100%;
      padding: 48px 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      text-align: center;
      border-top: 6px solid var(--accent);
      animation: slideUp 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: #D1FAE5; /* Emerald 100 */
      color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    [class*="icon"] i.ph, [class*="Icon"] i.ph { filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.15)); transition: transform 0.3s ease; }
    .icon-wrapper svg {
      width: 40px;
      height: 40px;
    }
    .icon-wrapper i.ph {
      font-size: 40px;
    }

    .success-card h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .success-card p {
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Como a tag a do btn-whatsapp/linkedin não pega a classe .btn-primary diretamente, ajustei aqui */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: var(--transition);
      width: 100%;
    }

    .btn-whatsapp {
      background: var(--whatsapp);
      color: #fff !important;
      border: 1px solid var(--whatsapp);
    }
    .btn-whatsapp:hover { 
      background: #1da851; 
      border-color: #1da851; 
      transform: translateY(-2px); 
    }

    .btn-linkedin {
      background: #f1f5f9;
      color: var(--linkedin) !important;
      border: 1px solid var(--border);
    }
    .btn-linkedin:hover { 
      background: #e2e8f0; 
    }

    .btn-back {
      background: transparent;
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 10px;
      font-weight: 600;
      text-decoration: none;
    }
    .btn-back:hover { 
      color: var(--primary); 
      text-decoration: underline; 
    }

    @media (max-width: 480px) {
      .success-card { padding: 40px 24px; }
      .success-card h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="success-card">
    <div class="icon-wrapper">
      <i class="ph ph-check-circle"></i>
    </div>
    
    <h1>Diagnóstico solicitado com sucesso!</h1>
    <p>Os dados da sua empresa foram recebidos com segurança. Em até 24 horas úteis, nossa equipe fará contato para agendar nossa reunião estratégica.</p>
    
    <div class="actions">
      <a href="https://api.whatsapp.com/send?phone=5567993515206&text=Ol%C3%A1!%20Acabei%20de%20solicitar%20um%20diagn%C3%B3stico%20pelo%20site%20e%20gostaria%20de%20adiantar%20o%20assunto." target="_blank" class="btn btn-whatsapp">
        <i class="ph ph-whatsapp-logo" style="font-size:20px"></i>
        Precisa de urgência? Chame no WhatsApp
      </a>
      
      <a href="https://www.linkedin.com/in/gestorrenato/" target="_blank" class="btn btn-linkedin">
        <i class="ph ph-linkedin-logo" style="font-size:20px"></i>
        Conectar com Renato no LinkedIn
      </a>

      <a href="/" class="btn-back">Voltar para a página inicial</a>
    </div>
  </div>

</body>
</html>
